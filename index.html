<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ЕГОР-КЛИКЕР</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--coral:#ff4757;--gold:#f59e0b;--cyan:#06b6d4;--bg:#07070f;--text:#fff;--dim:rgba(255,255,255,0.3);--mid:rgba(255,255,255,0.55);--bar:rgba(255,255,255,0.06);--font:'Inter',system-ui,sans-serif}
@keyframes drift{0%{background-position:0% 0%}100%{background-position:100% 100%}}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(255,71,87,0.08)}50%{box-shadow:0 0 40px rgba(255,71,87,0.18)}}
@keyframes ripp{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes flUp{0%{opacity:1;transform:translateY(0)scale(1)}100%{opacity:0;transform:translateY(-80px)scale(0.3)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
@keyframes spinR{to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(0.9);opacity:0}100%{transform:scale(1);opacity:1}}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;display:flex;justify-content:center;align-items:center;overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 30%at 50%-10%,rgba(255,71,87,0.05)0%,transparent),radial-gradient(ellipse 30% 30%at 80%110%,rgba(6,182,212,0.03)0%,transparent);animation:drift 20s ease-in-out infinite;pointer-events:none}
#app{width:100%;max-width:380px;padding:8px 14px 4px;position:relative;z-index:1;display:flex;flex-direction:column;gap:0}
.top{display:flex;justify-content:space-between;align-items:center;padding:0 0 6px;border-bottom:1px solid var(--bar);flex-shrink:0}
.top .l{font-size:14px;font-weight:800;display:flex;align-items:center;gap:4px}.top .l span{color:var(--gold)}
.top .r{font-size:11px;color:var(--mid);font-weight:600;display:flex;align-items:center;gap:3px}.top .r em{font-style:normal;color:var(--coral);font-weight:700}
.hero{display:flex;flex-direction:column;align-items:center;padding:2px 0;flex-shrink:0}
.photo{position:relative;width:150px;height:150px;cursor:pointer;animation:pulse 3s ease-in-out infinite;touch-action:manipulation}
.photo .glow{position:absolute;inset:-12px;border-radius:50%;background:radial-gradient(circle,rgba(255,71,87,0.08)0%,transparent 70%);pointer-events:none}
.photo .border{position:absolute;inset:-2px;border-radius:50%;border:2px solid transparent;border-top-color:var(--coral);border-right-color:var(--gold);border-bottom-color:var(--cyan);border-left-color:var(--gold);animation:spinR 5s linear infinite;pointer-events:none}
.photo .inner{width:100%;height:100%;border-radius:50%;overflow:hidden;position:relative;background:var(--bg)}
.photo .inner img{width:100%;height:100%;object-fit:cover;display:block;min-width:100%;min-height:100%}
.photo .ripples{position:absolute;inset:0;z-index:2;pointer-events:none}.photo .ripples div{position:absolute;border-radius:50%;border:1.5px solid var(--gold);animation:ripp .6s ease-out forwards;pointer-events:none}
.photo .parts{position:absolute;inset:0;z-index:3;pointer-events:none}.photo .parts div{position:absolute;font-weight:900;animation:flUp .9s ease-out forwards;pointer-events:none}
.photo:active{transform:scale(.92);transition:transform .1s}
.profit{text-align:center;font-size:10px;color:var(--mid);font-weight:500;flex-shrink:0;margin:0 0 1px}
.profit b{color:var(--gold);font-size:14px;font-weight:800}.profit em{font-style:normal;color:var(--dim);font-size:9px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;flex-shrink:0;border-bottom:1px solid var(--bar);padding:3px 0}
.stat{text-align:center;padding:1px 0}.stat+.stat{border-left:1px solid var(--bar)}
.stat .v{font-size:17px;font-weight:800;line-height:1.2}.stat .v.coral{color:var(--coral)}.stat .v.gold{color:var(--gold)}.stat .v.cyan{color:var(--cyan)}
.stat .l{font-size:7.5px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.stat .s{font-size:7.5px;color:var(--dim)}
.bars{display:flex;flex-direction:column;gap:2px;margin:2px 0 4px;flex-shrink:0}
.bar{display:flex;align-items:center;gap:4px}
.bar .i{font-size:8px;width:12px;text-align:center;color:var(--dim);flex-shrink:0}
.bar .t{flex:1;height:2px;background:var(--bar);border-radius:1px;overflow:hidden}
.bar .f{height:100%;border-radius:1px;transition:width .35s}
.bar .f.coral{background:linear-gradient(90deg,var(--coral),#ff6b7a)}
.bar .f.cyan{background:linear-gradient(90deg,var(--cyan),#3ce0ff)}
.bar .f.gold{background:linear-gradient(90deg,var(--gold),#ffc83d)}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:0 0 4px;flex-shrink:0}
.btn{border:none;border-radius:100px;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;padding:10px;transition:transform .15s;touch-action:manipulation}
.btn:active{transform:scale(.94)}
.btn-feed{background:linear-gradient(135deg,var(--coral),#7c3aed);color:#fff;box-shadow:0 3px 12px rgba(255,71,87,.15)}
.btn-rest{background:var(--card,rgba(255,255,255,.03));color:var(--text);border:1px solid var(--bar)}
.tabs{display:flex;border-bottom:1px solid var(--bar);flex-shrink:0;margin:0 0 3px}
.tab{flex:1;text-align:center;padding:6px 0;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);cursor:pointer;transition:color .2s;position:relative}
.tab.active{color:var(--coral)}.tab.active::after{content:'';position:absolute;bottom:-1px;left:15%;right:15%;height:2px;background:var(--coral);border-radius:1px}
.panel{display:none;flex:1;overflow-y:auto;padding:0 0 2px;scrollbar-width:none}
.panel.active{display:block}
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:2px 0}
.si{background:rgba(255,255,255,.03);border:1px solid var(--bar);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.si:active{transform:scale(.92)}
.si .ic{font-size:18px;line-height:1}.si .nm{font-size:8px;font-weight:700;margin-top:2px;line-height:1.1}
.si .pr{font-size:8px;color:var(--coral);font-weight:700}.si .ps{font-size:7px;color:var(--gold);font-weight:600}
.si .lv{position:absolute;top:-3px;right:-3px;background:var(--coral);color:#fff;width:14px;height:14px;border-radius:50%;font-size:7px;font-weight:800;display:flex;align-items:center;justify-content:center}
.si.locked{opacity:.25;pointer-events:none}.si.afford{border-color:rgba(255,71,87,.1)}
.si.combo{border-color:var(--gold)!important;background:rgba(245,158,11,.04)!important}
.si.combo::after{content:'🔥';position:absolute;top:-5px;left:-5px;font-size:11px}

.ml{display:flex;flex-direction:column;gap:4px;padding:2px 0 4px;overflow-y:auto;max-height:220px}
.mi{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--bar)}
.mi .ic{font-size:16px;width:20px;text-align:center}.mi .n{flex:1}.mi .n .t{font-size:11px;font-weight:600}.mi .n .s{font-size:9px;color:var(--mid);margin-top:1px}.mi .rw{font-size:12px;font-weight:800;color:var(--gold);padding:4px 10px;border-radius:100px;cursor:pointer;background:rgba(245,158,11,.1)}.mi .dn{font-size:14px;color:var(--gold)}

.dl{display:flex;flex-direction:column;gap:6px;padding:4px 0}
.dl .days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dl .day{text-align:center;padding:6px 2px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid var(--bar);font-size:7px;font-weight:600;color:var(--dim)}.dl .day.done{background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.2);color:#00e676}.dl .day.next{background:rgba(255,71,87,.08);border-color:var(--coral);color:var(--coral)}.dl .day .dv{font-size:10px;font-weight:800;margin-top:1px}
.dl .claim-btn{padding:11px;border:none;border-radius:100px;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;background:linear-gradient(135deg,var(--coral),#7c3aed);color:#fff;box-shadow:0 3px 12px rgba(255,71,87,.15);transition:transform .15s}
.dl .claim-btn:active{transform:scale(.94)}

.ft{display:flex;flex-shrink:0;border-top:1px solid var(--bar);padding:4px 0 0;justify-content:center;gap:12px;margin-top:auto}
.ft span{font-size:9px;color:var(--dim);font-weight:500}.ft b.coral{color:var(--coral);font-weight:700}.ft b.gold{color:var(--gold);font-weight:700}

.ev-over{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.ev-over.show{display:flex}
.ev-b{background:#0c0c1a;border-radius:20px;padding:22px 20px;max-width:310px;width:100%;text-align:center;border:1px solid rgba(255,255,255,.05);animation:popIn .35s}
.ev-b .ei{font-size:38px;display:block;margin-bottom:4px}
.ev-b h2{font-size:16px;font-weight:800;margin-bottom:2px}
.ev-b .ed{font-size:11px;color:var(--mid);margin-bottom:12px;line-height:1.5}
.ev-bt{padding:11px 22px;border:none;border-radius:100px;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;transition:transform .12s;touch-action:manipulation}
.ev-bt:active{transform:scale(.93)}
.ev-bt.pr{background:var(--coral);color:#fff;box-shadow:0 3px 12px rgba(255,71,87,.15)}
.ev-bt.ok{background:#00e676;color:#000}
.meter{height:34px;background:var(--bar);border-radius:6px;overflow:hidden;margin-bottom:12px;position:relative}
.meter .fl{height:100%;border-radius:6px;transition:width .08s linear;background:linear-gradient(90deg,var(--coral),var(--gold));position:relative}
.meter .fl::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.12)0%,transparent 60%)}
.meter .dz{position:absolute;top:0;right:0;width:25%;height:100%;background:rgba(255,71,87,.12);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:var(--coral);letter-spacing:1px}
.wh{height:130px;border-radius:12px;background:rgba(255,255,255,.02);margin-bottom:10px;position:relative;overflow:hidden}
.wh .wb{position:absolute;padding:8px 12px;border:none;border-radius:8px;font-size:10px;font-weight:700;font-family:var(--font);cursor:pointer;background:var(--coral);color:#fff;transition:all .05s;touch-action:manipulation}
.wh .wb:active{transform:scale(.9)}
#rst{position:fixed;bottom:8px;right:8px;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.03);border:1px solid var(--bar);color:var(--dim);font-size:9px;cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center}
.toasts{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;display:flex;flex-direction:column;gap:3px}
.toast{background:rgba(7,7,15,.92);backdrop-filter:blur(12px);color:#fff;padding:6px 14px;border-radius:100px;font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.05);animation:popIn .25s}
</style>
</head>
<body>
<div id="app">
<div class="top"><div class="l">❇️ <span id="bal">0</span></div><div class="r">⚡ <em id="en">500</em></div></div>
<div class="hero">
<div class="photo" id="clickArea">
<div class="glow"></div><div class="border"></div>
<div class="inner"><img src="https://api-minecraft.net/qltokfgp.jpg" alt="Егор"><div class="ripples" id="rippleBox"></div><div class="parts" id="particleBox"></div></div>
</div>
<div class="profit">Доход: <b id="ppsD">0</b>/сек <em id="ppcD">• 1/клик</em></div>
</div>
<div class="stats">
<div class="stat"><div class="v coral" id="sF">0</div><div class="l">Жир</div><div class="s">+<span id="sFps">0</span>/с</div></div>
<div class="stat"><div class="v" id="sB">100</div><div class="l">Мозги</div><div class="s">-<span id="sBd">1</span>/с</div></div>
<div class="stat"><div class="v gold" id="sE">100</div><div class="l">Энергия</div><div class="s">-<span id="sEd">1</span>/с</div></div>
</div>
<div class="bars">
<div class="bar"><span class="i">✦</span><div class="t"><div class="f coral" id="bF" style="width:50%"></div></div></div>
<div class="bar"><span class="i">◈</span><div class="t"><div class="f cyan" id="bB" style="width:100%"></div></div></div>
<div class="bar"><span class="i">◇</span><div class="t"><div class="f gold" id="bE" style="width:100%"></div></div></div>
</div>
<div class="acts">
<button class="btn btn-feed" id="btnF">✦ Покормить</button>
<button class="btn btn-rest" id="btnR">☾ Отдохнуть</button>
</div>
<div class="tabs"><div class="tab active" data-t="shop">Улучшения</div><div class="tab" data-t="missions">Миссии</div><div class="tab" data-t="daily">Ежедневно</div></div>
<div class="panel active" id="panelShop"><div class="sg" id="shopGrid"></div></div>
<div class="panel" id="panelMissions"><div class="ml" id="missionsList"></div></div>
<div class="panel" id="panelDaily"><div class="dl" id="dailyList"></div></div>
<div class="ft"><span>🔥 <b class="coral" id="cNum">x0</b></span><span>📅 <b class="gold" id="dayNum">1</b></span><span>❇️ <b class="coral" id="tNum">0</b></span></div>
</div>
<button id="rst">↺</button>
<div class="ev-over" id="evOver"><div class="ev-b"><div class="ei">💥</div><h2 id="evT">!</h2><div class="ed" id="evD">...</div><div id="evG"></div><button class="ev-bt pr" id="evB">Ok</button></div></div>
<div class="toasts" id="toastBox"></div>
<script>
const $=id=>document.getElementById(id),$$=s=>[...document.querySelectorAll(s)];
const S={f:0,b:100,mb:100,e:100,me:100,h:50,d:1,fl:0,tf:0,c:0,lc:0,cd:0,cm:[],dl:0,ds:0,fc:0,m:[0,0,0,0,0,0],u:{d:0,p:0,s:0,sh:0,k:0,v:0,tv:0,ac:0,h:0,o:0,nb:0,ps:0}};
const ITEMS=[
[{i:'d',n:'Дошик',b:15,m:1.35,e:1},{i:'p',n:'Пельмени',b:45,m:1.4,e:3},{i:'s',n:'Борщ',b:120,m:1.5,e:8},{i:'sh',n:'Шаурма',b:300,m:1.6,e:20}],
[{i:'k',n:'Кресло',b:25,m:1.5,e:1},{i:'v',n:'Диван',b:70,m:1.55,e:2},{i:'tv',n:'Телек',b:200,m:1.6,e:6},{i:'ac',n:'Кондей',b:500,m:1.7,e:15}],
[{i:'h',n:'Телефон',b:55,m:1.45,e:0.5},{i:'o',n:'Фольга',b:90,m:1.5,e:-0.5},{i:'nb',n:'Ноутбук',b:250,m:1.6,e:10},{i:'ps',n:'Приставка',b:600,m:1.7,e:25}]
];
const ICONS=['🍜','🥟','🥘','🌯','🪑','🛋️','📺','❄️','📱','🤖','💻','🎮'];
const MISSIONS=[
{n:'Набрать 150 жира',r:30,c:()=>S.tf>=150},{n:'Пережить 3 дня',r:50,c:()=>S.d>=3},
{n:'Купить 3 улучшения',r:40,c:()=>{let t=0;for(let k in S.u)t+=S.u[k];return t>=3}},
{n:'Кликнуть 100 раз',r:35,c:()=>S.tf>=100},{n:'Покормить 10 раз',r:25,c:()=>S.fc>=10},
{n:'Заработать 500',r:75,c:()=>S.tf>=500}
];
const EVS=[
{z:'💥',t:'ТУПОСТЬ!',d:'Жми чтобы не отупел!',b:'🧠 Жми!',g:'stupid',o:'Ок!',x:':('},
{z:'📱',t:'ТЕЛЕФОН',d:'Нажми ✕ 3 раза!',b:'✕',g:'phone',o:'Готово!',x:'😤'},
{z:'🍝',t:'ЕДА',d:'Жми когда откроет рот!',b:'👄',g:'food',o:'Ням!',x:'Мимо!'},
{z:'⏰',t:'ОПОЗДАЛ',d:'Реакция! Жми на зеленый!',b:'🟢',g:'late',o:'Успел!',x:'Уволен!'},
{z:'🤡',t:'АНЕКДОТ',d:'Выбери реакцию',b:'😅',g:'joke',o:'😄',x:'😐'}
];
function cost(i){const a=ITEMS.flat().find(x=>x.i===i);return Math.floor(a.b*Math.pow(a.m,S.u[i]||0))}
function gFps(){let p=0;for(const r of ITEMS.flat()){const l=S.u[r.i]||0;if(r.i!=='k'&&r.i!=='v'&&r.i!=='tv'&&r.i!=='ac')p+=l*r.e}return p}
function gFpc(){let p=1;for(const r of ITEMS.flat()){if(r.i==='k'||r.i==='v'||r.i==='tv'||r.i==='ac')p+=l*r.e;const l=S.u[r.i]||0;if(r.i==='k'||r.i==='v'||r.i==='tv'||r.i==='ac')p+=l*r.e}return p}
function gFpc(){let p=1;for(const r of['k','v','tv','ac']){p+=(S.u[r]||0)*(ITEMS.flat().find(x=>x.i===r)?.e||0)}return p}
function cl(v,a,b){return Math.max(a,Math.min(b,v))}
function rn(a,b){return a+Math.random()*(b-a)}
function sf(f,d,t='square',v=.03){try{const a=new AudioContext||new webkitAudioContext;const o=a.createOscillator(),g=a.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d);setTimeout(()=>a.close(),d*1e3+100)}catch(e){}}
function sc(){sf(680,.04)}function sg(){sf(900,.05);setTimeout(()=>sf(1120,.05),60)}function sb(){sf(200,.14,'sawtooth',.04)}function sp(){sf(560,.03);setTimeout(()=>sf(780,.03),45)}
function sv(){try{localStorage.setItem('egor6',JSON.stringify(S))}catch(e){}}
function ld(){try{const d=JSON.parse(localStorage.getItem('egor6'));if(d)Object.assign(S,d);S.cd=0}catch(e){}}
function rip(e){const b=$('rippleBox'),r=document.createElement('div');const R=b.getBoundingClientRect();r.style.left=((e&&e.clientX?e.clientX-R.left:75)-8)+'px';r.style.top=((e&&e.clientY?e.clientY-R.top:75)-8)+'px';const s=10+rn(0,20);r.style.width=s+'px';r.style.height=s+'px';b.appendChild(r);setTimeout(()=>r.remove(),700)}
function prt(t){const b=$('particleBox'),p=document.createElement('div');p.style.left=rn(20,70)+'%';p.style.top=rn(20,50)+'%';p.style.fontSize=(14+rn(0,12))+'px';p.textContent=t;b.appendChild(p);setTimeout(()=>p.remove(),900)}
function clk(e){if(S.ea)return;const n=Date.now();if(n-S.lc<300)S.c++;else S.c=1;S.lc=n;if(S.e<=0)return toast('⚡ Нет энергии!');if(S.b<=0)return toast('◈ Нет мозгов!');const cb=Math.min(S.c,10)*.06;const e2=Math.max(1,Math.floor(gFpc()*(1+cb)));S.f+=e2;S.tf+=e2;S.b=cl(S.b-1,0,S.mb);S.e=cl(S.e-1,0,S.me);sc();rip(e);prt('+'+e2);ckEv();up();sv()}
function fd(){if(S.ea)return;S.h=cl(S.h+25,0,100);S.e=cl(S.e+15,0,S.me);S.f+=3;S.tf+=3;S.fc=(S.fc||0)+1;sg();toast('✦ Покушал!');up();sv()}
function rs(){if(S.ea)return;S.e=cl(S.e+30,0,S.me);S.b=cl(S.b+10,0,S.mb);sg();toast('☾ Поспал!');up();sv()}
$('clickArea').addEventListener('click',clk);$('btnF').addEventListener('click',fd);$('btnR').addEventListener('click',rs);

function ckEv(){if(S.ea||S.cd>0){if(S.cd>0)S.cd--;return}if(Math.random()>.035-(S.u.o||0)*.017)return;const e=EVS[Math.floor(Math.random()*EVS.length)];mg(e)}
let mgA=false,mT=null;
function mg(e){S.ea=true;mgA=true;const ov=$('evOver'),bx=$('evBox'),gm=$('evG'),bn=$('evB');$('evT').textContent=e.t;$('evD').textContent=e.d;bx.querySelector('.ei').textContent=e.z;gm.innerHTML='';bn.style.display='none';ov.classList.add('show');const fn='mg_'+e.g;if(window[fn])window[fn](gm,bn,e)}
