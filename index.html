<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЕГОР-КЛИКЕР</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
--coral:#ff4757;--amber:#ffa502;--bg:#06060e;--surface:rgba(255,255,255,0.03);
--text:#fff;--text-dim:rgba(255,255,255,0.4);--text-mid:rgba(255,255,255,0.65);
--font:'Plus Jakarta Sans',system-ui,sans-serif;--title:'Anton','Plus Jakarta Sans',sans-serif;
--bar:rgba(255,255,255,0.06);
}
@keyframes bgShift{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}
@keyframes breathe{0%,100%{opacity:0.5}50%{opacity:0.8}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 40px rgba(255,71,87,0.15)}50%{box-shadow:0 0 60px rgba(255,71,87,0.3)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(0.3)}}
@keyframes slideUp{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
@keyframes modalPop{0%{opacity:0;transform:scale(0.92)}100%{opacity:1;transform:scale(1)}}
@keyframes numberPop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes textGlow{0%,100%{text-shadow:0 0 20px rgba(255,71,87,0.3)}50%{text-shadow:0 0 40px rgba(255,71,87,0.6)}}

body{
font-family:var(--font);background:var(--bg);color:var(--text);
min-height:100vh;min-height:100dvh;display:flex;justify-content:center;align-items:center;
overflow:hidden;position:relative;
}
body::before{
content:'';position:fixed;inset:0;
background:radial-gradient(ellipse at 50% 0%,rgba(255,71,87,0.06) 0%,transparent 50%),
radial-gradient(ellipse at 80% 100%,rgba(255,165,2,0.04) 0%,transparent 50%),
radial-gradient(ellipse at 20% 80%,rgba(255,71,87,0.03) 0%,transparent 50%);
animation:bgShift 15s ease-in-out infinite;pointer-events:none;z-index:0;
}
body::after{
content:'';position:fixed;inset:0;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.008) 2px,rgba(255,255,255,0.008) 4px);
pointer-events:none;z-index:0;
}

#app{width:100%;max-width:380px;padding:20px;position:relative;z-index:1;height:100vh;height:100dvh;display:flex;flex-direction:column;animation:slideUp 0.5s ease-out}

/* Header */
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:4px 0 0;flex-shrink:0;position:relative}
.top-bar::after{content:'';position:absolute;bottom:-12px;left:0;right:0;height:1px;background:var(--bar)}
.top-left{font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase}
.top-left span{color:var(--amber);font-weight:700}
.top-right{display:flex;gap:12px;font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:0.5px}
.top-right .fail{color:var(--coral)}

/* Main content */
.main-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:8px 0 0;overflow:hidden}

/* Photo Section */
.photo-section{position:relative;margin-bottom:4px;flex-shrink:0}
.photo-glow{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
width:220px;height:220px;border-radius:50%;
background:radial-gradient(circle,rgba(255,71,87,0.2) 0%,transparent 70%);
animation:breathe 3s ease-in-out infinite;pointer-events:none;
}
.photo-wrap{
position:relative;width:180px;height:180px;border-radius:50%;cursor:pointer;touch-action:manipulation;
animation:glowPulse 3s ease-in-out infinite;
transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.photo-wrap:active{transform:scale(0.92);animation:none}
.photo-inner{
width:100%;height:100%;border-radius:50%;overflow:hidden;position:relative;
border:2px solid rgba(255,71,87,0.15);
}
.photo-inner img{width:100%;height:100%;object-fit:cover;display:block}
.photo-ring{
position:absolute;inset:-3px;border-radius:50%;
border:1.5px solid transparent;
border-top-color:var(--coral);
border-right-color:var(--amber);
border-bottom-color:var(--coral);
border-left-color:var(--amber);
animation:spinSlow 4s linear infinite;
pointer-events:none;
}
@keyframes spinSlow{to{transform:rotate(360deg)}}

.ripple-box,.particle-box{position:absolute;inset:0;border-radius:50%;pointer-events:none;overflow:hidden}
.ripple-el{
position:absolute;border-radius:50%;border:1.5px solid var(--coral);
animation:ripple 0.7s ease-out forwards;
}

.title-section{text-align:center;margin:8px 0 4px;flex-shrink:0}
.title-section h1{
font-family:var(--title);font-size:32px;letter-spacing:3px;line-height:1;
background:linear-gradient(135deg,var(--coral) 0%,var(--amber) 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.title-section .hint{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:4px;font-weight:500}

/* Stats Row */
.stats-row{display:flex;gap:4px;width:100%;margin:4px 0 8px;flex-shrink:0}
.stat-item{flex:1;text-align:center;padding:6px 4px;position:relative}
.stat-item+.stat-item::before{
content:'';position:absolute;left:0;top:20%;height:60%;width:1px;background:var(--bar);
}
.stat-num{font-size:22px;font-weight:800;line-height:1.2;transition:transform 0.2s}
.stat-num.coral{color:var(--coral)}
.stat-num.amber{color:var(--amber)}
.stat-num.white{color:var(--text)}
.stat-lbl{font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-top:2px}
.stat-sub{font-size:8px;color:var(--text-dim);letter-spacing:0.5px;margin-top:1px}

/* Bars */
.bar-group{width:100%;display:flex;flex-direction:column;gap:3px;margin:0 0 10px;flex-shrink:0}
.bar-row{display:flex;align-items:center;gap:6px}
.bar-ico{font-size:10px;width:16px;text-align:center;flex-shrink:0}
.bar-trk{flex:1;height:3px;background:var(--bar);border-radius:2px;overflow:hidden}
.bar-fl{height:100%;border-radius:2px;transition:width 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.bar-fl.coral{background:linear-gradient(90deg,var(--coral),#ff6b7a)}
.bar-fl.cyan{background:linear-gradient(90deg,#06b6d4,#3ce0ff)}
.bar-fl.amber{background:linear-gradient(90deg,var(--amber),#ffbe33)}

/* Actions */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin:0 0 10px;flex-shrink:0}
.btn{
padding:13px;border:none;border-radius:100px;font-size:13px;font-weight:700;font-family:var(--font);
cursor:pointer;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);touch-action:manipulation;
letter-spacing:0.5px;position:relative;overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.12) 50%,transparent 70%);opacity:0;transition:opacity 0.3s}
.btn:active{transform:scale(0.95)}
.btn-feed{background:var(--coral);color:#fff;box-shadow:0 4px 20px rgba(255,71,87,0.25)}
.btn-rest{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid rgba(255,255,255,0.08)}
.btn-rest:hover{border-color:rgba(255,255,255,0.15)}

/* Shop */
.shop-area{width:100%;flex-shrink:0;margin-top:auto;padding-top:4px}
.shop-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.shop-hdr h3{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;font-weight:600}
.shop-hdr span{font-size:8px;color:var(--text-dim)}
.shop-row{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.shop-i{
background:var(--surface);border:1px solid var(--bar);border-radius:10px;padding:6px 3px;text-align:center;cursor:pointer;
transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);position:relative;
}
.shop-i:active{transform:scale(0.9)}
.shop-i .ico{font-size:16px;line-height:1}
.shop-i .nm{font-size:7px;color:var(--text-dim);margin-top:1px;font-weight:600;line-height:1.1}
.shop-i .pr{font-size:7px;color:var(--coral);font-weight:700;margin-top:1px}
.shop-i .lvl{
position:absolute;top:-3px;right:-3px;background:var(--coral);color:#fff;
width:14px;height:14px;border-radius:50%;font-size:7px;font-weight:800;display:flex;align-items:center;justify-content:center;
box-shadow:0 2px 8px rgba(255,71,87,0.3);
}
.shop-i.locked{opacity:0.25;cursor:default}
.shop-i.locked:active{transform:none}
.shop-i.can{border-color:rgba(255,71,87,0.2);background:rgba(255,71,87,0.04)}

/* Footer */
.footer{display:flex;justify-content:center;align-items:center;padding:6px 0 0;gap:16px;flex-shrink:0}
.footer-item{font-size:10px;color:var(--text-dim);font-weight:500;letter-spacing:0.3px}
.footer-item .v{font-weight:700}.footer-item .v.coral{color:var(--coral)}.footer-item .v.amber{color:var(--amber)}

/* Reset */
.reset-btn{
position:fixed;bottom:12px;right:12px;width:32px;height:32px;border-radius:50%;
background:var(--surface);border:1px solid var(--bar);color:var(--text-dim);font-size:11px;cursor:pointer;
transition:all 0.3s;z-index:50;display:flex;align-items:center;justify-content:center;
}

/* Event Modal */
.event-overlay{
position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
display:none;align-items:center;justify-content:center;z-index:100;padding:24px;
}
.event-overlay.show{display:flex}
.event-m{
background:#0c0c1a;border-radius:20px;padding:28px 24px;max-width:300px;width:100%;text-align:center;
border:1px solid rgba(255,71,87,0.1);box-shadow:0 0 80px rgba(255,71,87,0.05);
animation:modalPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.event-m .ei{font-size:48px;display:block;margin-bottom:8px}
.event-m h2{font-size:18px;font-weight:800;letter-spacing:-0.3px;margin-bottom:4px}
.event-m p{font-size:12px;color:var(--text-mid);margin-bottom:20px;line-height:1.5}
.event-b{
padding:13px 28px;border:none;border-radius:100px;font-size:14px;font-weight:700;font-family:var(--font);
cursor:pointer;transition:all 0.2s;min-width:120px;touch-action:manipulation;
background:var(--coral);color:#fff;box-shadow:0 4px 20px rgba(255,71,87,0.25);
}
.event-b:active{transform:scale(0.94)}
.event-b.ok{background:linear-gradient(135deg,#00e676,#00c853);box-shadow:0 4px 20px rgba(0,230,118,0.2)}
.event-b.bad{background:linear-gradient(135deg,#ff1744,#d50000);box-shadow:0 4px 20px rgba(255,23,68,0.2)}

/* Toast */
.toasts{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{
background:rgba(6,6,14,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
color:#fff;padding:8px 16px;border-radius:100px;font-size:12px;font-weight:600;
border:1px solid rgba(255,255,255,0.06);box-shadow:0 4px 20px rgba(0,0,0,0.3);
animation:slideUp 0.25s ease-out;
}

@media(max-width:360px){
#app{padding:16px}
.photo-wrap{width:150px;height:150px}
.title-section h1{font-size:26px}
.stat-num{font-size:18px}
}
</style>
</head>
<body>

<div id="app">
  <div class="top-bar">
    <div class="top-left">День <span id="dNum">1</span></div>
    <div class="top-right"><span>💀 <span class="fail" id="fNum">0</span></span><span>🍔 <span id="tfNum">0</span></span></div>
  </div>

  <div class="main-content">
    <div class="photo-section">
      <div class="photo-glow"></div>
      <div class="photo-wrap" id="clickArea">
        <div class="photo-inner">
          <img src="https://api-minecraft.net/qltokfgp.jpg" alt="Егор" id="egorImg">
          <div class="ripple-box" id="rippleBox"></div>
          <div class="particle-box" id="particleBox"></div>
        </div>
        <div class="photo-ring"></div>
      </div>
    </div>

    <div class="title-section">
      <h1>ЕГОР-КЛИКЕР</h1>
      <div class="hint">👇 кликай по егору</div>
    </div>

    <div class="stats-row">
      <div class="stat-item"><div class="stat-num coral" id="fatNum">0</div><div class="stat-lbl">Жир</div><div class="stat-sub">+<span id="fpsNum">0</span>/с</div></div>
      <div class="stat-item"><div class="stat-num white" id="brainNum">100</div><div class="stat-lbl">Мозги</div><div class="stat-sub">-<span id="bpdNum">1</span>/с</div></div>
      <div class="stat-item"><div class="stat-num amber" id="energyNum">100</div><div class="stat-lbl">Энергия</div><div class="stat-sub">-<span id="epdNum">1</span>/с</div></div>
    </div>

    <div class="bar-group">
      <div class="bar-row"><span class="bar-ico">🍔</span><div class="bar-trk"><div class="bar-fl coral" id="fatBar" style="width:50%"></div></div></div>
      <div class="bar-row"><span class="bar-ico">🧠</span><div class="bar-trk"><div class="bar-fl cyan" id="brainBar" style="width:100%"></div></div></div>
      <div class="bar-row"><span class="bar-ico">⚡</span><div class="bar-trk"><div class="bar-fl amber" id="energyBar" style="width:100%"></div></div></div>
    </div>

    <div class="actions">
      <button class="btn btn-feed" id="btnF">🍔 Покормить</button>
      <button class="btn btn-rest" id="btnR">💤 Отдохнуть</button>
    </div>
  </div>

  <div class="shop-area">
    <div class="shop-hdr"><h3>🏪 Магазин</h3><span id="shopHint">жми чтобы купить</span></div>
    <div class="shop-row" id="shopGrid"></div>
  </div>

  <div class="footer">
    <div class="footer-item">🔥 Комбо: <span class="v" id="comboNum">x0</span></div>
    <div class="footer-item">📅 День <span class="v amber" id="dayNum">1</span></div>
    <div class="footer-item">🍔 <span class="v coral" id="totalNum">0</span></div>
  </div>
</div>

<button class="reset-btn" id="resetBtn">↺</button>

<div class="event-overlay" id="evOver">
  <div class="event-m">
    <span class="ei" id="evIco">💥</span>
    <h2 id="evTitle">ПРИСТУП ТУПОСТИ!</h2>
    <p id="evDesc">Жми быстро!</p>
    <button class="event-b" id="evBtn">🔨 Жми!</button>
  </div>
</div>

<div class="toasts" id="toastBox"></div>

<script>
const $=id=>document.getElementById(id);
const state={
  f:0,b:100,mb:100,e:100,me:100,h:50,d:1,fl:0,tf:0,c:0,lc:0,cd:0,
  up:{d:0,p:0,k:0,v:0,h:0,o:0}
};
const SHOP=[
  {i:'d',c:'🍜',n:'Дошик',b:15,m:1.5,e:'+1 жир/с'},
  {i:'p',c:'🥟',n:'Пельмени',b:50,m:1.6,e:'+3 жир/с'},
  {i:'k',c:'🪑',n:'Кресло',b:30,m:1.8,e:'+1 жир/клик'},
  {i:'v',c:'🛋️',n:'Диван',b:80,m:1.8,e:'+2 жир/клик'},
  {i:'h',c:'📱',n:'Телефон',b:60,m:2.0,e:'Меньше скуки'},
  {i:'o',c:'🤖',n:'Фольга',b:100,m:2.0,e:'-50% тупости'},
];
const EVENTS=[
  {z:'💥',t:'ПРИСТУП ТУПОСТИ!',d:'Егор перестал думать. Жми быстро!',b:'🧠 Жми!',y:'t',n:7,ti:3500,s:'Не накосячил!',f:'Накосячил! ( ͠° ͟ʖ ͡° )'},
  {z:'📱',t:'ЗАВИС В ТЕЛЕФОНЕ',d:'Егор залип в ТикТоке. Жди 3 секунды.',b:'😤 Ждать...',y:'w',n:3000,s:'Отлип наконец-то!',f:'Залип ещё сильнее! -10 жира'},
  {z:'🍝',t:'СТРАННАЯ ЕДА',d:'Егор ест макароны с вареньем. Ну ок.',b:'🍴 Ок',y:'b',n:5,s:'Он доволен! +5 жира',f:'Тебя стошнило. -3 жира'},
  {z:'⏰',t:'ОПОЗДАЛ!',d:'Егор проспал. Опять. Шеф звонит!',b:'📞 Оправд.',y:'t',n:4,ti:3000,s:'Повезло — сказал пробки',f:'УВОЛЕН! Шучу. -10 жира'},
  {z:'🤡',t:'АНЕКДОТ ОТ ЕГОРА',d:'"Идет медведь по лесу... короче, я забыл."',b:'😂 Смеяться',y:'t',n:3,ti:2000,s:'Егор счастлив! +3 жира',f:'Кринж века. -2 жира'},
];

function cost(i){const s=SHOP.find(x=>x.i===i);return Math.floor(s.b*Math.pow(s.m,state.up[i]||0))}
function fps(){return(state.up.d||0)*1+(state.up.p||0)*3}
function fpc(){return 1+(state.up.k||0)*1+(state.up.v||0)*2}
function cl(a,b,c){return Math.max(b,Math.min(c,a))}
function rr(a,b){return a+Math.random()*(b-a)}

function beep(f,d,t='square',v=0.05){
  try{
    const a=new(window.AudioContext||window.webkitAudioContext)();
    const o=a.createOscillator(),g=a.createGain();
    o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);
    o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d);
    setTimeout(()=>a.close(),d*1000+100);
  }catch(e){}
}
function sc(){beep(660,0.06)}
function sg(){beep(880,0.07);setTimeout(()=>beep(1100,0.07),80)}
function sb(){beep(220,0.18,'sawtooth',0.06)}
function sp(){beep(550,0.04);setTimeout(()=>beep(770,0.04),60)}

function sv(){try{localStorage.setItem('egor3',JSON.stringify(state))}catch(e){}}
function ld(){try{const d=JSON.parse(localStorage.getItem('egor3'));if(d)Object.assign(state,d)}catch(e){}}

function ripple(e){
  const b=$('rippleBox'),r=document.createElement('div');
  r.className='ripple-el';const rect=b.getBoundingClientRect();
  if(e&&e.clientX){r.style.left=(e.clientX-rect.left-12)+'px';r.style.top=(e.clientY-rect.top-12)+'px'}
  else{r.style.left='80px';r.style.top='80px'}
  const s=10+rr(0,20);r.style.width=s+'px';r.style.height=s+'px';
  b.appendChild(r);setTimeout(()=>r.remove(),700);
}

function parts(t){
  const b=$('particleBox'),p=document.createElement('div');
  p.style.cssText=`position:absolute;font-size:${16+rr(0,14)}px;pointer-events:none;animation:floatUp 1s ease-out forwards;left:${rr(15,75)}%;top:${rr(20,50)}%`;
  p.textContent=t;b.appendChild(p);setTimeout(()=>p.remove(),1000);
}

function clickEgor(e){
  if(state.ea)return;
  const n=Date.now();
  if(n-state.lc<250)state.c++;else state.c=1;
  state.lc=n;
  if(state.e<=0)return toast('💀 Егор в отключке! Покорми или отдохни.');
  if(state.b<=0)return toast('🧠💥 Мозги кончились! Отдохни.');
  const cb=Math.min(state.c,10)*0.1,ep=state.e<20?0.5:1;
  const earn=Math.floor(fpc()*ep);
  state.f+=earn;state.tf+=earn;state.b=cl(state.b-1,0,state.mb);state.e=cl(state.e-1,0,state.me);
  sc();ripple(e);parts('+'+earn);ce();up();sv();
}
$('clickArea').addEventListener('click',clickEgor);

function feed(){
  if(state.ea)return;
  state.h=cl(state.h+25,0,100);state.e=cl(state.e+15,0,state.me);state.f+=3;state.tf+=3;
  sg();toast('🍔 Егор покушал!');up();sv();
}
function rest(){
  if(state.ea)return;
  state.e=cl(state.e+30,0,state.me);state.b=cl(state.b+10,0,state.mb);
  sg();toast('💤 Егор поспал!');up();sv();
}
$('btnF').addEventListener('click',feed);
$('btnR').addEventListener('click',rest);

function ce(){
  if(state.ea||state.cd>0){if(state.cd>0)state.cd--;return}
  const ch=Math.min(0.1,0.06-(state.up.o||0)*0.03);
  if((state.up.o||0)>0&&Math.random()<0.5)return;
  if(Math.random()<ch){const e=EVENTS[Math.floor(Math.random()*EVENTS.length)];trEv(e)}
}

let et=0,ett=null;
function trEv(e){
  state.ea=true;
  const ov=$('evOver');$('evIco').textContent=e.z;$('evTitle').textContent=e.t;$('evDesc').textContent=e.d;
  const bn=$('evBtn');bn.textContent=e.b;bn.className='event-b';ov.classList.add('show');
  if(e.y==='w'){
    bn.style.pointerEvents='none';bn.style.opacity='0.4';
    setTimeout(()=>{bn.style.pointerEvents='auto';bn.style.opacity='1';bn.onclick=()=>rsEv(true,e)},e.n);
  }else if(e.y==='b'){
    bn.onclick=()=>rsEv(true,e);
  }else if(e.y==='t'){
    et=0;bn.onclick=()=>{et++;bn.textContent=`${e.b} (${et}/${e.n})`;beep(400+et*50,0.04);if(et>=e.n)rsEv(true,e)};
    ett=setTimeout(()=>{if(state.ea)rsEv(false,e)},e.ti);
  }
}
function rsEv(ok,e){
  if(!state.ea)return;state.ea=false;$('evOver').classList.remove('show');
  if(ett){clearTimeout(ett);ett=null}
  if(ok){toast('✅ '+e.s);state.f+=2;state.tf+=2;if(e.y==='b'){state.f+=e.n;state.tf+=e.n;parts('+'+e.n)};sg()}
  else{toast('❌ '+e.f);state.fl++;const p=e.y==='w'?10:e.y==='b'?3:5;state.f=Math.max(0,state.f-p);sb()}
  state.cd=8+Math.floor(Math.random()*8);up();sv();
}
$('evOver').addEventListener('click',function(e){
  if(e.target===this&&state.ea){state.ea=false;this.classList.remove('show');state.fl++;sb();toast('❌ Струсил!');up();sv()}
});

function renderShop(){
  $('shopGrid').innerHTML=SHOP.map(item=>{
    const c=cost(item.i),l=state.up[item.i]||0,a=state.f>=c;
    return `<div class="shop-i ${a?'can':''}${!a?' locked':''}" data-i="${item.i}">
      ${l>0?`<div class="lvl">${l}</div>`:''}
      <div class="ico">${item.c}</div>
      <div class="nm">${item.n}</div>
      <div class="pr">${c}</div>
    </div>`
  }).join('');
  document.querySelectorAll('.shop-i').forEach(el=>{
    el.addEventListener('click',()=>{
      const i=el.dataset.i,c=cost(i);
      if(state.f<c||(state.up[i]||0)>=99)return;
      state.f-=c;state.up[i]=(state.up[i]||0)+1;sp();toast('✅ '+SHOP.find(x=>x.i===i).n+'!');up();renderShop();sv();
    });
  });
}

function toast(m){
  const b=$('toastBox'),t=document.createElement('div');t.className='toast';t.textContent=m;
  b.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(-8px)';t.style.transition='all 0.3s';setTimeout(()=>t.remove(),300)},2000);
}

function up(){
  const fp=fps(),fc=fpc(),bd=Math.max(1,1+Math.floor(state.d/3)),ed=Math.max(1,1+Math.floor(state.d/5));
  $('fatNum').textContent=Math.floor(state.f);
  $('brainNum').textContent=Math.floor(state.b);
  $('energyNum').textContent=Math.floor(state.e);
  $('fpsNum').textContent=fp;$('bpdNum').textContent=bd;$('epdNum').textContent=ed;
  $('fatBar').style.width=state.h+'%';
  $('brainBar').style.width=(state.b/state.mb*100)+'%';
  $('energyBar').style.width=(state.e/state.me*100)+'%';
  $('dNum').textContent=state.d;$('fNum').textContent=state.fl;$('tfNum').textContent=Math.floor(state.tf);
  $('comboNum').textContent='x'+state.c;
  $('dayNum').textContent=state.d;$('totalNum').textContent=Math.floor(state.tf);
  
  const nd=1+Math.floor(state.tf/50);
  if(nd>state.d){state.d=nd;state.mb=100+state.d*8;state.me=100+state.d*8;toast('🌙 День '+state.d+'!')}
}

function loop(){
  if(!state.ea){
    const fp=fps(),bd=Math.max(1,1+Math.floor(state.d/3)),ed=Math.max(1,1+Math.floor(state.d/5));
    if(fp>0&&state.b>0&&state.e>0){state.f+=fp*0.1;state.tf+=fp*0.1}
    state.h=cl(state.h-0.12,0,100);
    state.b=cl(state.b-bd*0.04,0,state.mb);
    state.e=cl(state.e-ed*0.04,0,state.me);
    ce();up();renderShop();sv();
  }
}

function reset(){if(confirm('Сбросить прогресс?')){localStorage.removeItem('egor3');location.reload()}}
$('resetBtn').addEventListener('click',reset);

document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){e.preventDefault();if(state.ea)$('evBtn').click();else clickEgor(e)}
  if(e.key==='f')feed();if(e.key==='r')rest()
});

ld();up();renderShop();setInterval(loop,100);
toast('🐷 Кликай по Егору! Пробел/F/R');
</script>
</body>
</html>
