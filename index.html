<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ЕГОР-КЛИКЕР</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--coral:#ff4757;--gold:#f59e0b;--cyan:#06b6d4;--purple:#7c3aed;--bg:#07070f;--card:rgba(255,255,255,0.03);--text:#fff;--dim:rgba(255,255,255,0.3);--mid:rgba(255,255,255,0.55);--bar:rgba(255,255,255,0.06);--font:'Inter',system-ui,sans-serif}
@keyframes bgDrift{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}
@keyframes pulseShadow{0%,100%{box-shadow:0 0 25px rgba(255,71,87,0.1)}50%{box-shadow:0 0 45px rgba(255,71,87,0.2)}}
@keyframes ripp{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes flUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(0.3)}}
@keyframes slideUp{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.92);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes countUp{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes spinR{to{transform:rotate(360deg)}}
@keyframes glowPulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;justify-content:center;align-items:center;overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 40% at 50% -10%,rgba(255,71,87,0.06) 0%,transparent 100%),radial-gradient(ellipse 35% 35% at 80% 110%,rgba(124,58,237,0.04) 0%,transparent 100%);animation:bgDrift 25s ease-in-out infinite;pointer-events:none;z-index:0}
#app{width:100%;max-width:380px;padding:10px 14px;position:relative;z-index:1;height:100vh;height:100dvh;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;padding:0 0 8px;flex-shrink:0;border-bottom:1px solid var(--bar);margin-bottom:0}
.top .l{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:var(--text)}
.top .l span{color:var(--gold)}
.top .r{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--mid);font-weight:600}
.top .r em{font-style:normal;color:var(--coral);font-weight:700}
.hero{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;flex-shrink:0;position:relative;margin:-2px 0 0}
.photo{position:relative;width:150px;height:150px;cursor:pointer;touch-action:manipulation;animation:pulseShadow 3s ease-in-out infinite}
.photo .glow{position:absolute;inset:-15px;border-radius:50%;background:radial-gradient(circle,rgba(255,71,87,0.1) 0%,transparent 70%);animation:glowPulse 4s ease-in-out infinite;pointer-events:none}
.photo .border{position:absolute;inset:-2px;border-radius:50%;border:2px solid transparent;border-top-color:var(--coral);border-right-color:var(--gold);border-bottom-color:var(--purple);border-left-color:var(--cyan);animation:spinR 6s linear infinite;pointer-events:none}
.photo .inner{width:100%;height:100%;border-radius:50%;overflow:hidden;position:relative;background:var(--bg)}
.photo .inner img{width:100%;height:100%;object-fit:cover;display:block;min-width:100%;min-height:100%}
.photo .ripples{position:absolute;inset:0;pointer-events:none;z-index:2}
.photo .ripples .r{position:absolute;border-radius:50%;border:2px solid var(--gold);pointer-events:none;animation:ripp 0.7s ease-out forwards}
.photo .parts{position:absolute;inset:0;pointer-events:none;z-index:3}
.photo .parts .p{position:absolute;font-weight:900;pointer-events:none;animation:flUp 1s ease-out forwards}
.photo:active{transform:scale(0.92);transition:transform 0.12s}
.profit{text-align:center;margin:0 0 2px;flex-shrink:0;font-size:11px;color:var(--mid);font-weight:500}
.profit b{color:var(--gold);font-size:15px;font-weight:800}
.profit em{font-style:normal;color:var(--dim);font-size:9px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;margin:2px 0 4px;flex-shrink:0;border-bottom:1px solid var(--bar);padding-bottom:4px}
.stat{text-align:center;padding:2px}
.stat+.stat{border-left:1px solid var(--bar)}
.stat .v{font-size:18px;font-weight:800;line-height:1.2}
.stat .v.coral{color:var(--coral)}.stat .v.gold{color:var(--gold)}.stat .v.cyan{color:var(--cyan)}
.stat .l{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.stat .s{font-size:8px;color:var(--dim)}
.bars{display:flex;flex-direction:column;gap:2px;margin:0 0 4px;flex-shrink:0}
.bar{display:flex;align-items:center;gap:4px}
.bar .i{font-size:8px;width:12px;text-align:center;flex-shrink:0;color:var(--dim)}
.bar .t{flex:1;height:2px;background:var(--bar);border-radius:2px;overflow:hidden}
.bar .f{height:100%;border-radius:2px;transition:width 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.bar .f.coral{background:linear-gradient(90deg,var(--coral),#ff6b7a)}
.bar .f.cyan{background:linear-gradient(90deg,var(--cyan),#3ce0ff)}
.bar .f.gold{background:linear-gradient(90deg,var(--gold),#ffc83d)}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:0 0 6px;flex-shrink:0}
.btn{border:none;border-radius:100px;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);touch-action:manipulation;display:flex;align-items:center;justify-content:center;gap:5px;padding:11px}
.btn:active{transform:scale(0.94)}
.btn-feed{background:linear-gradient(135deg,var(--coral),var(--purple));color:#fff;box-shadow:0 3px 12px rgba(255,71,87,0.15)}
.btn-rest{background:var(--card);color:var(--text);border:1px solid var(--bar)}
.tabs{display:flex;gap:0;flex-shrink:0;margin:0 0 4px;border-bottom:1px solid var(--bar)}
.tab{flex:1;text-align:center;padding:6px 0;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);cursor:pointer;transition:all 0.2s;position:relative}
.tab.active{color:var(--coral)}.tab.active::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:2px;background:var(--coral);border-radius:2px}
.shop{flex:1;overflow:hidden;min-height:0;display:none;flex-direction:column}
.shop.active{display:flex}
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;overflow-y:auto;padding:2px 0 4px;scrollbar-width:none}
.si{background:var(--card);border:1px solid var(--bar);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.si:active{transform:scale(0.92)}
.si .ic{font-size:20px;line-height:1}
.si .nm{font-size:8px;font-weight:700;color:var(--text);margin-top:2px;line-height:1.1}
.si .pr{font-size:8px;color:var(--coral);font-weight:700}
.si .pps{font-size:7px;color:var(--gold);font-weight:600;margin-top:1px}
.si .lv{position:absolute;top:-3px;right:-3px;background:var(--coral);color:#fff;width:15px;height:15px;border-radius:50%;font-size:7px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(255,71,87,0.3)}
.si.locked{opacity:0.25;cursor:default;pointer-events:none}
.si.afford{border-color:rgba(255,71,87,0.12)}
.si.combo{border-color:var(--gold)!important;background:rgba(245,158,11,0.04)!important}
.si.combo::after{content:'🔥';position:absolute;top:-5px;left:-5px;font-size:12px}
.ms{flex:1;overflow-y:auto;display:none;flex-direction:column;gap:4px;padding:2px 0}
.ms.active{display:flex}
.mi{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border-radius:10px;border:1px solid var(--bar)}
.mi .ico{font-size:18px;width:24px;text-align:center}.mi .info{flex:1}.mi .info .nm{font-size:11px;font-weight:600;line-height:1.2}.mi .info .pr{font-size:9px;color:var(--mid);margin-top:1px}.mi .rew{font-size:11px;font-weight:800;color:var(--gold);white-space:nowrap}.mi .ck{font-size:16px;color:var(--success,var(--gold));font-weight:700}
.ft{display:flex;flex-shrink:0;border-top:1px solid var(--bar);padding:4px 0 0;justify-content:center;gap:10px}
.ft .i{font-size:9px;color:var(--dim);font-weight:500}
.ft .i b.coral{color:var(--coral);font-weight:700}
.ft .i b.gold{color:var(--gold);font-weight:700}
.nav{display:grid;grid-template-columns:repeat(3,1fr);flex-shrink:0;gap:0;border-top:1px solid var(--bar);padding:4px 0 0;margin-top:auto}
.nav .n{text-align:center;padding:6px 0;font-size:9px;font-weight:600;color:var(--dim);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:1px}.nav .n.active{color:var(--coral)}
.ev-over{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.ev-over.show{display:flex}
.ev-box{background:#0c0c1a;border-radius:20px;padding:24px 20px;max-width:320px;width:100%;text-align:center;border:1px solid rgba(255,255,255,0.05);animation:pop 0.35s cubic-bezier(0.34,1.56,0.64,1)}
.ev-box .ei{font-size:42px;display:block;margin-bottom:4px}
.ev-box h2{font-size:17px;font-weight:800;margin-bottom:2px;letter-spacing:-0.3px}
.ev-box .ed{font-size:11px;color:var(--mid);margin-bottom:14px;line-height:1.5}
.ev-btn{padding:12px 24px;border:none;border-radius:100px;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all 0.15s;touch-action:manipulation;display:inline-flex;align-items:center;gap:6px}
.ev-btn.primary{background:var(--coral);color:#fff;box-shadow:0 3px 12px rgba(255,71,87,0.2)}
.ev-btn.ok{background:#00e676;color:#000}
.ev-btn:active{transform:scale(0.92)}
.meter{position:relative;height:36px;background:var(--bar);border-radius:6px;overflow:hidden;margin-bottom:14px}
.meter .fill{height:100%;border-radius:6px;transition:width 0.08s linear;background:linear-gradient(90deg,var(--coral),var(--gold));position:relative}
.meter .fill::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 60%)}
.meter .zone{position:absolute;top:0;right:0;width:25%;height:100%;background:rgba(255,71,87,0.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:var(--coral);letter-spacing:1px}
.whack{position:relative;height:140px;border-radius:12px;background:rgba(255,255,255,0.02);margin-bottom:10px;overflow:hidden}
.whack .wb{position:absolute;padding:9px 14px;border:none;border-radius:8px;font-size:10px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all 0.08s;touch-action:manipulation;background:var(--coral);color:#fff;box-shadow:0 3px 12px rgba(255,71,87,0.2)}
.whack .wb:active{transform:scale(0.9)}
.toasts{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;display:flex;flex-direction:column;gap:4px}
.toast{background:rgba(7,7,15,0.92);backdrop-filter:blur(12px);color:#fff;padding:7px 14px;border-radius:100px;font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,0.05);animation:slideUp 0.2s ease-out}
#rst{position:fixed;bottom:10px;right:10px;width:26px;height:26px;border-radius:50%;background:var(--card);border:1px solid var(--bar);color:var(--dim);font-size:10px;cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="app">
<div class="top">
<div class="l">❇️ <span id="balTop">0</span></div>
<div class="r">⚡ <em id="enTop">500</em></div>
</div>
<div class="hero">
<div class="photo" id="clickArea">
<div class="glow"></div>
<div class="border"></div>
<div class="inner">
<img src="https://api-minecraft.net/qltokfgp.jpg" alt="Егор">
<div class="ripples" id="rippleBox"></div>
<div class="parts" id="particleBox"></div>
</div>
</div>
<div class="profit">Доход: <b id="ppsDisplay">0</b>/сек <em id="ppcDisplay">• 1/клик</em></div>
</div>
<div class="stats">
<div class="stat"><div class="v coral" id="sFat">0</div><div class="l">Жир</div><div class="s">+<span id="sFps">0</span>/с</div></div>
<div class="stat"><div class="v" id="sBrain">100</div><div class="l">Мозги</div><div class="s">-<span id="sBd">1</span>/с</div></div>
<div class="stat"><div class="v gold" id="sEnergy">100</div><div class="l">Энергия</div><div class="s">-<span id="sEd">1</span>/с</div></div>
</div>
<div class="bars">
<div class="bar"><span class="i">✦</span><div class="t"><div class="f coral" id="bFat" style="width:50%"></div></div></div>
<div class="bar"><span class="i">◈</span><div class="t"><div class="f cyan" id="bBrain" style="width:100%"></div></div></div>
<div class="bar"><span class="i">◇</span><div class="t"><div class="f gold" id="bEnergy" style="width:100%"></div></div></div>
</div>
<div class="acts">
<button class="btn btn-feed" id="btnF">✦ Покормить</button>
<button class="btn btn-rest" id="btnR">☾ Отдохнуть</button>
</div>
<div class="tabs">
<div class="tab active" data-tab="upgrades">Улучшения</div>
<div class="tab" data-tab="missions">Миссии</div>
<div class="tab" data-tab="daily">Ежедневно</div>
</div>
<div class="shop active" id="tabUpgrades"><div class="sg" id="shopGrid"></div></div>
<div class="ms" id="tabMissions"></div>
<div class="ms" id="tabDaily"></div>
<div class="ft">
<div class="i">🔥 <b class="coral" id="cNum">x0</b></div>
<div class="i">📅 День <b class="gold" id="dayNum">1</b></div>
<div class="i">❇️ <b class="coral" id="tNum">0</b></div>
</div>
<div class="nav"><div class="n active" data-view="main">Главная</div><div class="n" data-view="shop">Магазин</div><div class="n" data-view="stats">Стата</div></div>
</div>
<button id="rst">↺</button>
<div class="ev-over" id="evOver"><div class="ev-box" id="evBox"><div class="ei">💥</div><h2 id="evTitle">!</h2><div class="ed" id="evDesc">...</div><div id="evGame"></div><button class="ev-btn primary" id="evBtn">Ok</button></div></div>
<div class="toasts" id="toastBox"></div>
<script>
const $=id=>document.getElementById(id),$$=s=>document.querySelectorAll(s);
const S={f:0,b:100,mb:100,e:100,me:100,h:50,d:1,fl:0,tf:0,c:0,lc:0,cd:0,cm:[],dl:0,mn:[0,0,0,0,0],u:{d:0,p:0,s:0,sh:0,k:0,v:0,tv:0,ac:0,h:0,o:0,nb:0,ps:0}};
const SHOP=[
[ {i:'d',n:'Дошик',b:15,m:1.35,e:1,t:'f'},{i:'p',n:'Пельмени',b:45,m:1.4,e:3,t:'f'},{i:'s',n:'Борщ',b:120,m:1.5,e:8,t:'f'},{i:'sh',n:'Шаурма',b:300,m:1.6,e:20,t:'f'}],
[ {i:'k',n:'Кресло',b:25,m:1.5,e:1,t:'c'},{i:'v',n:'Диван',b:70,m:1.55,e:2,t:'c'},{i:'tv',n:'Телек',b:200,m:1.6,e:6,t:'c'},{i:'ac',n:'Кондей',b:500,m:1.7,e:15,t:'c'}],
[ {i:'h',n:'Телефон',b:55,m:1.45,e:0.5,t:'x'},{i:'o',n:'Фольга',b:90,m:1.5,e:-0.5,t:'x'},{i:'nb',n:'Ноутбук',b:250,m:1.6,e:10,t:'x'},{i:'ps',n:'Приставка',b:600,m:1.7,e:25,t:'x'}]
];
const MISSIONS=[
{n:'Набрать 150 жира',r:30,ck:()=>S.tf>=150},{n:'Пережить 3 дня',r:50,ck:()=>S.d>=3},{n:'Купить 3 улучшения',r:40,ck:()=>{let c=0;for(let k in S.u)c+=S.u[k];return c>=3}},{n:'Кликнуть 100 раз',r:35,ck:()=>S.tf>=100},{n:'Покормить 10 раз',r:25,ck:()=>S.feedCount>=10},{n:'Заработать 500 жира',r:75,ck:()=>S.tf>=500}
];
const EVENTS=[
{z:'💥',t:'ТУПОСТЬ!',d:'Егор тупеет! Жми быстрее!',b:'🧠 Жми!',id:'stupid',ok:'Ок!',fail:':(',ms:1},
{z:'📱',t:'ТЕЛЕФОН',d:'Найди кнопку!',b:'✕',id:'phone',ok:'Готово!',fail:':(',ms:2},
{z:'🍝',t:'ЕДА',d:'Жми когда откроет рот!',b:'👄',id:'food',ok:'Ням!',fail:'Мимо!',ms:2},
{z:'⏰',t:'ОПОЗДАЛ',d:'Реакция! Жми на зеленый!',b:'🟢',id:'late',ok:'Успел!',fail:':(',ms:1},
{z:'🤡',t:'АНЕКДОТ',d:'Выбери реакцию',b:'😅',id:'joke',ok:'😂',fail:'😐',ms:1}
];
function cost(i,c){const s=SHOP.flat().find(x=>x.i===i),l=S.u[i]||0;return Math.floor((c||s.b)*Math.pow(s.m,l))}
function fps(){let p=0;for(const r of SHOP.flat()){if(r.t==='c')continue;const l=S.u[r.i]||0;p+=l*r.e}return p}
function fpc(){let p=1;for(const r of SHOP.flat()){if(r.t!=='c')continue;const l=S.u[r.i]||0;p+=l*r.e}return p}
function cl(v,a,b){return Math.max(a,Math.min(b,v))}function rn(a,b){return a+Math.random()*(b-a)}
function sf(f,d,t='square',v=0.03){try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d);setTimeout(()=>a.close(),d*1000+100)}catch(e){}}
function sc(){sf(680,0.04)}function sg(){sf(900,0.05);setTimeout(()=>sf(1120,0.05),60)}function sb(){sf(200,0.14,'sawtooth',0.04)}function sp(){sf(560,0.03);setTimeout(()=>sf(780,0.03),45)}
function sv(){try{localStorage.setItem('egor5',JSON.stringify(S))}catch(e){}}
function ld(){try{const d=JSON.parse(localStorage.getItem('egor5'));if(d)Object.assign(S,d);S.cd=0}catch(e){}}
function ripp(e){const b=$('rippleBox'),r=document.createElement('div');r.className='r';const rect=b.getBoundingClientRect();r.style.left=((e&&e.clientX?e.clientX-rect.left:75)-10)+'px';r.style.top=((e&&e.clientY?e.clientY-rect.top:75)-10)+'px';const s=10+rn(0,25);r.style.width=s+'px';r.style.height=s+'px';b.appendChild(r);setTimeout(()=>r.remove(),700)}
function part(t){const b=$('particleBox'),p=document.createElement('div');p.className='p';p.style.left=rn(15,75)+'%';p.style.top=rn(20,50)+'%';p.style.fontSize=(14+rn(0,14))+'px';p.textContent=t;b.appendChild(p);setTimeout(()=>p.remove(),900)}
function clickEgor(e){if(S.ea)return;const n=Date.now();if(n-S.lc<300)S.c++;else S.c=1;S.lc=n;if(S.e<=0)return toast('⚡ Энергия кончилась!');if(S.b<=0)return toast('◈ Мозги кончились!');const cb=Math.min(S.c,10)*0.06;const earn=Math.max(1,Math.floor(fpc()*(1+cb)));S.f+=earn;S.tf+=earn;S.b=cl(S.b-1,0,S.mb);S.e=cl(S.e-1,0,S.me);sc();ripp(e);part('+'+earn);chkEv();up();sv()}
$('clickArea').addEventListener('click',clickEgor);
function feed(){if(S.ea)return;S.h=cl(S.h+25,0,100);S.e=cl(S.e+15,0,S.me);S.f+=3;S.tf+=3;S.feedCount=(S.feedCount||0)+1;sg();toast('✦ Покушал!');up();sv()}
function rest(){if(S.ea)return;S.e=cl(S.e+30,0,S.me);S.b=cl(S.b+10,0,S.mb);sg();toast('☾ Поспал!');up();sv()}
$('btnF').addEventListener('click',feed);$('btnR').addEventListener('click',rest);

// Combo
function genCombo(){const all=SHOP.flat();const ids=[];while(ids.length<3){const r=all[Math.floor(Math.random()*all.length)];if(!ids.includes(r.i))ids.push(r.i)}S.cm=ids}
function getComboBonus(){return S.cm.length===3?50+Math.floor(S.d*5):0}

// Daily
function dailyAvailable(){const now=Date.now();return !S.dl||now-S.dl>86400000}
function claimDaily(){if(!dailyAvailable())return;const rewards=[0,50,100,200,350,500,750,1000];let s=1+(S.ds||0);if(s>7)s=1;const r=rewards[s];S.f+=r;S.tf+=r;S.dl=Date.now();S.ds=s;sg();toast('📅 День '+s+': +'+r+' ❇️!');up();sv()}
function dailyReset(){if(S.dl&&Date.now()-S.dl>86400000*2)S.ds=0}

// Render
let currentTab='upgrades',currentView='main';
function renderShop(){const cat=currentTab==='upgrades'?0:currentTab==='missions'?0:0;$('shopGrid').innerHTML=SHOP.flat().map(item=>{const l=S.u[item.i]||0,c=cost(item.i),a=S.f>=c;const cm=S.cm.includes(item.i);return `<div class="si ${a&&l<99?'afford':''}${l>=99||!a?' locked':''}${cm?' combo':''}" data-i="${item.i}"><div class="ic">${['🍜','🥟','🥘','🌯','🪑','🛋️','📺','❄️','📱','🤖','💻','🎮'][SHOP.flat().indexOf(item)]}</div><div class="nm">${item.n}</div><div class="pr">${c}</div>${item.t!=='c'?`<div class="pps">✦ ${l*item.e}/с</div>`:`<div class="pps">✦ ${(l>0?'+':'')+l*item.e}/клик</div>`}${l>0?`<div class="lv">${l}</div>`:''}</div>`}).join('');document.querySelectorAll('.si').forEach(el=>{el.addEventListener('click',()=>{const i=el.dataset.i,c=cost(i),item=SHOP.flat().find(x=>x.i===i);if(S.f<c||(S.u[i]||0)>=99)return;S.f-=c;S.u[i]=(S.u[i]||0)+1;sp();if(S.cm.includes(i)){const b=getComboBonus();S.f+=b;S.tf+=b;toast('🔥 КОМБО! +'+b+' ❇️');S.cm=[]}else{toast('✅ '+item.n+'!')}up();renderShop();sv()})})}
function renderMissions(){const c=$('tabMissions');c.innerHTML='<div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:4px">Задания</div>';MISSIONS.forEach((m,i)=>{const d=S.mn[i];c.innerHTML+=`<div class="mi" style="${d?'opacity:0.4':''}"><div class="ico">${m.ck()&&!d?'🔥':d?'✅':'📋'}</div><div class="info"><div class="nm">${m.n}</div><div class="pr">Награда: +${m.r} ❇️</div></div>${m.ck()&&!d?`<div class="rew" style="cursor:pointer" data-mi="${i}">Забрать</div>`:d?'<div class="ck">✓</div>':''}</div>`});document.querySelectorAll('[data-mi]').forEach(el=>{el.addEventListener('click',()=>{const i=parseInt(el.dataset.mi);if(MISSIONS[i].ck()&&!S.mn[i]){S.mn[i]=1;S.f+=MISSIONS[i].r;S.tf+=MISSIONS[i].r;sg();toast('✅ Миссия выполнена! +'+MISSIONS[i].r+' ❇️');up();renderMissions();sv()}}})}
function renderDaily(){const c=$('tabDaily');const r=[0,50,100,200,350,500,750,1000];let s=1+(S.ds||0);if(s>7)s=1;const av=dailyAvailable();c.innerHTML=`<div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:6px">Ежедневный бонус</div><div style="display:flex;gap:4px;margin-bottom:8px">${r.map((v,i)=>{if(i===0)return '';let cls=av&&i===s?'next':i<(S.ds||0)+1?'done':'';return `<div style="flex:1;text-align:center;padding:8px 2px;border-radius:8px;background:${cls==='done'?'rgba(0,230,118,0.1)':cls==='next'?'rgba(255,71,87,0.1)':'var(--card)'};border:1px solid ${cls==='next'?'var(--coral)':cls==='done'?'rgba(0,230,118,0.2)':'var(--bar)'}"><div style="font-size:16px;margin-bottom:2px">${cls==='done'?'✅':cls==='next'?'🎁':'📅'}</div><div style="font-size:7px;font-weight:700;color:${cls==='done'?'#00e676':cls==='next'?'var(--coral)':'var(--dim)'}">День ${i}</div><div style="font-size:8px;font-weight:800;color:${cls==='done'?'#00e676':'var(--gold)'}">+${v}</div></div>`}).join('')}</div>${av?`<button class="btn btn-feed" id="claimDaily" style="padding:10px;font-size:12px">🎁 Забрать ежедневку</button>`:'<div style="text-align:center;font-size:11px;color:var(--dim)">Завтра будет новый бонус!</div>'}`;const cb=$('claimDaily');if(cb)cb.addEventListener('click',claimDaily);}
function switchView(v){currentView=v;$$('.nav .n').forEach(el=>el.classList.toggle('active',el.dataset.view===v));$$('.nav,.ft,.tabs,.shop,.ms').forEach(el=>el.style.display='');if(v==='main'){$('app').style.overflow='';$$('.shop,.ms').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.nav,.top,.hero,.stats,.bars,.acts,.tabs,.ft').forEach(el=>el.style.display='')}if(v==='shop'){$('app').style.overflow='';$$('.top,.hero,.stats,.bars,.acts,.tabs,.shop,.ms').forEach(el=>el.style.display='');$('shopGrid').closest('.shop').classList.add('active')}if(v==='stats'){$('app').style.overflow='';$$('.top,.hero,.stats,.bars,.acts,.tabs,.shop,.ms').forEach(el=>el.style.display='');$('tabMissions').classList.add('active');renderMissions()}}

$$('.tab').forEach(el=>el.addEventListener('click',()=>{$$('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');currentTab=el.dataset.tab;renderShop();renderDaily()}))

function up(){const fp=fps(),fc=fpc(),bd=Math.max(1,1+Math.floor(S.d/3)),ed=Math.max(1,1+Math.floor(S.d/5));$('balTop').textContent=Math.floor(S.f);$('enTop').textContent=Math.floor(S.e);$('ppsDisplay').textContent=Math.floor(fp);$('ppcDisplay').textContent='• '+fc+'/клик';$('sFat').textContent=Math.floor(S.f);$('sBrain').textContent=Math.floor(S.b);$('sEnergy').textContent=Math.floor(S.e);$('sFps').textContent=fp;$('sBd').textContent=bd;$('sEd').textContent=ed;$('bFat').style.width=S.h+'%';$('bBrain').style.width=(S.b/S.mb*100)+'%';$('bEnergy').style.width=(S.e/S.me*100)+'%';$('cNum').textContent='x'+S.c;$('dayNum').textContent=S.d;$('tNum').textContent=Math.floor(S.tf);const nd=1+Math.floor(S.tf/80);if(nd>S.d){S.d=nd;S.mb=100+S.d*6;S.me=100+S.d*6;toast('🌙 День '+S.d+'!')}renderDaily()}
