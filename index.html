<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЕГОР-КЛИКЕР</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Epilogue:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
--pink:#EC4899;--amber:#F59E0B;--cyan:#06B6D4;--bg:#080810;--surface:rgba(255,255,255,0.04);
--text:#fff;--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.3);--danger:#ff3355;--success:#00ff88;
--font:'Epilogue',system-ui,-apple-system,sans-serif;--font-title:'Anton','Epilogue',sans-serif;
}
@keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes float{0%,100%{transform:translateY(0) translateX(0)}33%{transform:translateY(-20px) translateX(10px)}66%{transform:translateY(-10px) translateX(-10px)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 30px rgba(236,72,153,0.3),0 0 60px rgba(245,158,11,0.15)}50%{box-shadow:0 0 40px rgba(236,72,153,0.5),0 0 80px rgba(6,182,212,0.2)}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
@keyframes slideUp{0%{opacity:0;transform:translateY(30px) scale(0.96)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-5px)}20%,40%,60%,80%{transform:translateX(5px)}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(0.4)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.6}100%{transform:scale(3);opacity:0}}
@keyframes countPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes modalIn{0%{opacity:0;transform:scale(0.9) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes borderGlow{0%,100%{border-color:var(--pink);box-shadow:0 0 20px rgba(236,72,153,0.3),inset 0 0 20px rgba(236,72,153,0.05)}33%{border-color:var(--amber);box-shadow:0 0 20px rgba(245,158,11,0.3),inset 0 0 20px rgba(245,158,11,0.05)}66%{border-color:var(--cyan);box-shadow:0 0 20px rgba(6,182,212,0.3),inset 0 0 20px rgba(6,182,212,0.05)}}

body{
font-family:var(--font);background:var(--bg);color:var(--text);
min-height:100vh;min-height:100dvh;display:flex;justify-content:center;align-items:center;
overflow:hidden;position:relative;
}
.bg-glow{
position:fixed;top:-50%;left:-50%;width:200%;height:200%;
background:radial-gradient(ellipse at 30% 20%,rgba(236,72,153,0.08) 0%,transparent 50%),
radial-gradient(ellipse at 70% 80%,rgba(6,182,212,0.06) 0%,transparent 50%),
radial-gradient(ellipse at 50% 50%,rgba(245,158,11,0.04) 0%,transparent 50%);
animation:bgMove 20s ease-in-out infinite;pointer-events:none;z-index:0;
}
.bg-particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bg-dot{
position:absolute;width:3px;height:3px;background:var(--text3);border-radius:50%;
animation:float 8s ease-in-out infinite;opacity:0.3;
}
.bg-dot:nth-child(1){top:15%;left:10%;animation-delay:0s;animation-duration:7s}
.bg-dot:nth-child(2){top:30%;right:20%;animation-delay:1s;animation-duration:9s}
.bg-dot:nth-child(3){top:60%;left:5%;animation-delay:2s;animation-duration:8s}
.bg-dot:nth-child(4){top:80%;right:15%;animation-delay:0.5s;animation-duration:10s}
.bg-dot:nth-child(5){top:45%;left:80%;animation-delay:3s;animation-duration:7.5s}
.bg-dot:nth-child(6){top:10%;right:40%;animation-delay:1.5s;animation-duration:8.5s}

#app{width:100%;max-width:400px;padding:16px;position:relative;z-index:1;animation:slideUp 0.6s ease-out}

/* HEADER */
.header{text-align:center;margin-bottom:16px}
.header h1{
font-family:var(--font-title);font-size:28px;letter-spacing:2px;line-height:1;
background:linear-gradient(135deg,var(--pink),var(--amber),var(--cyan),var(--pink));
background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text;animation:bgMove 4s linear infinite;
}
.header .sub{font-size:12px;color:var(--text2);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.header .sub span{color:var(--amber);font-weight:700}

/* EGOR PHOTO */
.photo-section{display:flex;flex-direction:column;align-items:center;margin-bottom:16px}
.egor-wrap{
position:relative;width:180px;height:180px;border-radius:50%;cursor:pointer;
animation:pulseGlow 3s ease-in-out infinite;touch-action:manipulation;
}
.egor-wrap:active{animation:none;transform:scale(0.94);transition:transform 0.1s}
.egor-border{
position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--pink);
animation:borderGlow 4s linear infinite;pointer-events:none;
}
.egor-img{
width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;
position:relative;z-index:1;
}
.click-hint{
font-size:11px;color:var(--text3);margin-top:8px;letter-spacing:2px;text-transform:uppercase;
transition:all 0.3s;animation:pulseGlow 2s ease-in-out infinite;
}
.egor-wrap:hover+.click-hint{color:var(--pink)}

/* RIPPLES */
.ripple-container{position:absolute;inset:0;border-radius:50%;overflow:hidden;pointer-events:none;z-index:2}
.ripple-el{
position:absolute;width:20px;height:20px;border:2px solid var(--pink);border-radius:50%;
animation:ripple 0.6s ease-out forwards;
}

/* PARTICLES */
.particle-box{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3}
.particle-el{position:absolute;font-size:18px;pointer-events:none;animation:floatUp 1s ease-out forwards}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{
background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-radius:16px;padding:12px 8px;text-align:center;
border:1px solid rgba(255,255,255,0.06);transition:all 0.3s;
}
.stat-card:hover{border-color:rgba(255,255,255,0.12);transform:translateY(-1px)}
.stat-icon{font-size:18px;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:800;line-height:1;margin-bottom:2px;transition:all 0.2s}
.stat-value.pink{color:var(--pink)}.stat-value.green{color:var(--success)}.stat-value.amber{color:var(--amber)}
.stat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.stat-sub{font-size:9px;color:var(--text3);margin-top:2px}

/* BARS */
.bars-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-icon{font-size:12px;width:20px;text-align:center;flex-shrink:0}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.4s cubic-bezier(0.34,1.56,0.64,1);position:relative}
.bar-fill.pink{background:linear-gradient(90deg,var(--pink),#ff6ba6)}
.bar-fill.cyan{background:linear-gradient(90deg,var(--cyan),#3ce0ff)}
.bar-fill.amber{background:linear-gradient(90deg,var(--amber),#ffc83d)}

/* ACTIONS */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.btn-action{
padding:14px;border:none;border-radius:14px;font-size:14px;font-weight:700;font-family:var(--font);
cursor:pointer;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);touch-action:manipulation;
position:relative;overflow:hidden;
}
.btn-action::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.1) 50%,transparent 70%);opacity:0;transition:opacity 0.3s}
.btn-action:hover::after{opacity:1}
.btn-action:active{transform:scale(0.95)}
.btn-feed{background:linear-gradient(135deg,#c084fc,#a855f7);color:#fff;box-shadow:0 4px 20px rgba(192,132,252,0.25)}
.btn-rest{background:linear-gradient(135deg,#f472b6,#ec4899);color:#fff;box-shadow:0 4px 20px rgba(244,114,182,0.25)}

/* SHOP */
.shop-section{margin-bottom:16px}
.shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.shop-header h3{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.shop-header .hint{font-size:9px;color:var(--text3)}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.shop-card{
background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-radius:12px;padding:10px;text-align:center;cursor:pointer;
border:1px solid rgba(255,255,255,0.06);transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
position:relative;overflow:hidden;
}
.shop-card:active{transform:scale(0.94)}
.shop-card .icon{font-size:22px;margin-bottom:2px}
.shop-card .name{font-size:11px;font-weight:600;margin-bottom:1px;color:var(--text)}
.shop-card .cost{font-size:10px;color:var(--pink);font-weight:700}
.shop-card .desc{font-size:8px;color:var(--text3);line-height:1.3}
.shop-card .lvl{position:absolute;top:4px;right:4px;font-size:9px;font-weight:700;color:var(--success);background:rgba(0,255,136,0.1);border-radius:8px;padding:1px 6px}
.shop-card.affordable{background:linear-gradient(135deg,var(--surface),rgba(236,72,153,0.06));border-color:rgba(236,72,153,0.15)}
.shop-card.affordable:hover{border-color:rgba(236,72,153,0.3);box-shadow:0 0 20px rgba(236,72,153,0.08)}
.shop-card.locked{opacity:0.35;cursor:not-allowed}
.shop-card.locked:active{transform:none}

/* FOOTER */
.footer-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.footer-card{
background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-radius:12px;padding:10px 8px;text-align:center;border:1px solid rgba(255,255,255,0.04);
}
.footer-card .num{font-size:18px;font-weight:800;line-height:1}
.footer-card .num.danger{color:var(--danger)}
.footer-card .num.pink{color:var(--pink)}
.footer-card .num.amber{color:var(--amber)}
.footer-card .lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* RESET */
.reset-btn{
position:fixed;bottom:16px;right:16px;width:36px;height:36px;border-radius:50%;
background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.06);color:var(--text3);font-size:14px;cursor:pointer;
transition:all 0.3s;z-index:50;display:flex;align-items:center;justify-content:center;
}
.reset-btn:hover{background:rgba(255,51,85,0.15);border-color:var(--danger);color:var(--danger)}

/* EVENT MODAL */
.event-overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
display:none;align-items:center;justify-content:center;z-index:100;padding:20px;
}
.event-overlay.show{display:flex}
.event-modal{
background:linear-gradient(145deg,#1a1a3e,rgba(236,72,153,0.06));
border-radius:24px;padding:28px 24px;max-width:320px;width:100%;text-align:center;
border:1px solid rgba(255,255,255,0.08);box-shadow:0 0 60px rgba(236,72,153,0.1);
animation:modalIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.event-modal .ev-icon{font-size:56px;margin-bottom:8px;display:block}
.event-modal h2{font-size:20px;font-weight:800;margin-bottom:6px;letter-spacing:-0.3px}
.event-modal p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.event-btn{
padding:14px 32px;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:var(--font);
cursor:pointer;transition:all 0.2s;min-width:140px;touch-action:manipulation;
background:linear-gradient(135deg,var(--pink),#ff6ba6);color:#fff;
box-shadow:0 4px 20px rgba(236,72,153,0.3);
}
.event-btn:active{transform:scale(0.94)}
.event-btn.success{background:linear-gradient(135deg,var(--success),#00cc66);box-shadow:0 4px 20px rgba(0,255,136,0.25)}
.event-btn.danger{background:linear-gradient(135deg,var(--danger),#ff5577);box-shadow:0 4px 20px rgba(255,51,85,0.25)}

/* TOAST */
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
.toast{
background:rgba(8,8,16,0.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
color:#fff;padding:10px 20px;border-radius:14px;font-size:13px;font-weight:600;
border:1px solid rgba(255,255,255,0.08);box-shadow:0 8px 30px rgba(0,0,0,0.4);
animation:modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);margin-bottom:8px;
}

/* DAY CHANGE */
.celebration{
position:fixed;top:0;left:0;width:100%;height:100%;
display:flex;align-items:center;justify-content:center;z-index:150;pointer-events:none;
background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);
opacity:0;transition:opacity 0.5s;
}
.celebration.show{opacity:1}
.celebration-text{
font-family:var(--font-title);font-size:48px;letter-spacing:4px;
background:linear-gradient(135deg,var(--amber),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
animation:modalIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

@media(max-width:380px){
#app{padding:12px}
.egor-wrap{width:150px;height:150px}
.header h1{font-size:24px}
.stat-value{font-size:18px}
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-particles">
  <div class="bg-dot"></div><div class="bg-dot"></div><div class="bg-dot"></div>
  <div class="bg-dot"></div><div class="bg-dot"></div><div class="bg-dot"></div>
</div>

<div id="app">
  <div class="header">
    <h1>ЕГОР-КЛИКЕР</h1>
    <div class="sub">День <span id="dayDisplay">1</span> · Провалов <span id="failDisplay">0</span></div>
  </div>

  <div class="photo-section">
    <div class="egor-wrap" id="egorClick">
      <div class="egor-border"></div>
      <img class="egor-img" id="egorPhoto" src="https://api-minecraft.net/qltokfgp.jpg" alt="Егор" crossorigin="anonymous">
      <div class="ripple-container" id="rippleBox"></div>
      <div class="particle-box" id="particleBox"></div>
    </div>
    <div class="click-hint">👇 КЛИКАЙ ПО ЕГОРУ</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">🍔</div>
      <div class="stat-value pink" id="fatVal">0</div>
      <div class="stat-label">Жир</div>
      <div class="stat-sub">+<span id="fps">0</span>/сек</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🧠</div>
      <div class="stat-value green" id="brainVal">100</div>
      <div class="stat-label">Мозги</div>
      <div class="stat-sub">-<span id="bpd">1</span>/сек</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⚡</div>
      <div class="stat-value amber" id="energyVal">100</div>
      <div class="stat-label">Энергия</div>
      <div class="stat-sub">-<span id="epd">1</span>/сек</div>
    </div>
  </div>

  <div class="bars-group">
    <div class="bar-row"><span class="bar-icon">🍔</span><div class="bar-track"><div class="bar-fill pink" id="fatBar" style="width:50%"></div></div></div>
    <div class="bar-row"><span class="bar-icon">🧠</span><div class="bar-track"><div class="bar-fill cyan" id="brainBar" style="width:100%"></div></div></div>
    <div class="bar-row"><span class="bar-icon">⚡</span><div class="bar-track"><div class="bar-fill amber" id="energyBar" style="width:100%"></div></div></div>
  </div>

  <div class="actions">
    <button class="btn-action btn-feed" id="btnFeed">🍔 Покормить</button>
    <button class="btn-action btn-rest" id="btnRest">💤 Отдохнуть</button>
  </div>

  <div class="shop-section">
    <div class="shop-header">
      <h3>🏪 Магазин хлама</h3>
      <span class="hint">жми чтобы купить</span>
    </div>
    <div class="shop-grid" id="shopGrid"></div>
  </div>

  <div class="footer-stats">
    <div class="footer-card"><div class="num danger" id="failsTotal">0</div><div class="lbl">💀 Провалы</div></div>
    <div class="footer-card"><div class="num pink" id="totalFatVal">0</div><div class="lbl">🍔 Всего жира</div></div>
    <div class="footer-card"><div class="num amber" id="dayTotal">1</div><div class="lbl">📅 Дни</div></div>
  </div>
</div>

<button class="reset-btn" id="resetBtn">↺</button>

<div class="event-overlay" id="eventOverlay">
  <div class="event-modal">
    <span class="ev-icon" id="evIcon">💥</span>
    <h2 id="evTitle">ПРИСТУП ТУПОСТИ!</h2>
    <p id="evDesc">Егор перестал думать. Жми!</p>
    <button class="event-btn" id="evBtn">🔨 Жми быстро!</button>
  </div>
</div>

<div class="celebration" id="celebration"><div class="celebration-text">🌙 НОВЫЙ ДЕНЬ</div></div>
<div class="toast-container" id="toastBox"></div>

<script>
const $=id=>document.getElementById(id);
const state={
  fat:0,brains:100,maxBrains:100,energy:100,maxEnergy:100,hunger:50,day:1,fails:0,totalFat:0,
  upgrades:{dos:0,pel:0,kre:0,div:0,phn:0,fol:0},
  eventActive:false,combo:0,lastClick:0,evCooldown:0
};
const shop=[
  {id:'dos',i:'🍜',n:'Дошик',c:15,m:1.5,e:'+1 жир/сек'},
  {id:'pel',i:'🥟',n:'Пельмени',c:50,m:1.6,e:'+3 жир/сек'},
  {id:'kre',i:'🪑',n:'Кресло',c:30,m:1.8,e:'+1 жир/клик'},
  {id:'div',i:'🛋️',n:'Диван',c:80,m:1.8,e:'+2 жир/клик'},
  {id:'phn',i:'📱',n:'Телефон',c:60,m:2.0,e:'Больше скуки'},
  {id:'fol',i:'🤖',n:'Шапка фольги',c:100,m:2.0,e:'-50% тупости'},
];
const events=[
  {i:'💥',t:'ПРИСТУП ТУПОСТИ!',d:'Егор тупит. Жми быстро!',b:'🧠 Жми!',tp:'tap',n:7,ti:3500,s:{t:'Ура!',d:'Не накосячил.'},f:{t:'Провал!',d:'Накосячил.'}},
  {i:'📱',t:'ЗАВИС В ТЕЛЕФОНЕ',d:'Егор в ТикТоке. Жди 3 сек.',b:'Ждать...',tp:'wait',n:3000,s:{t:'Отлип',d:'Ну ещё видос...'},f:{t:'Залип',d:'-10 жира.'}},
  {i:'🍝',t:'СТРАННАЯ ЕДА',d:'Егор ест макароны с вареньем.',b:'🍴 Ок',tp:'bonus',n:5,s:{t:'Он доволен',d:'+5 жира!'},f:{t:'Тошнит',d:'-3 жира.'}},
  {i:'⏰',t:'ОПОЗДАЛ!',d:'Егор проспал. Шеф звонит!',b:'📞 Оправд.',tp:'tap',n:4,ti:3000,s:{t:'Повезло',d:'Сказал пробки.'},f:{t:'Уволен',d:'¯\\_(ツ)_/¯'}},
  {i:'🤡',t:'АНЕКДОТ ОТ ЕГОРА',d:'"Идет медведь... короче, забыл."',b:'😂 Смеяться',tp:'tap',n:3,ti:2000,s:{t:'Егор счастлив',d:'+3 жира!'},f:{t:'Кринж',d:'-2 жира.'}},
];

function cost(id){const s=shop.find(x=>x.id===id);const l=state.upgrades[id]||0;return Math.floor(s.c*Math.pow(s.m,l))}
function fps(){return state.upgrades.dos*1+state.upgrades.pel*3}
function fpc(){return 1+state.upgrades.kre*1+state.upgrades.div*2}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function rnd(a,b){return a+Math.random()*(b-a)}

const audio={ctx:null};
function tone(f,d,t='square',v=0.06){
  try{
    if(!audio.ctx)audio.ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=audio.ctx.createOscillator(),g=audio.ctx.createGain();
    o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,audio.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audio.ctx.currentTime+d);
    o.connect(g);g.connect(audio.ctx.destination);o.start();o.stop(audio.ctx.currentTime+d);
  }catch(e){}
}
function sndClick(){tone(600,0.07)}
function sndGood(){tone(800,0.08);setTimeout(()=>tone(1000,0.08),80)}
function sndBad(){tone(200,0.2,'sawtooth',0.07)}
function sndBuy(){tone(500,0.05);setTimeout(()=>tone(700,0.05),60)}

function save(){try{localStorage.setItem('egor2',JSON.stringify(state))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('egor2'));if(d)Object.assign(state,d)}catch(e){}}

function clickEgor(e){
  if(state.eventActive)return;
  const now=Date.now();
  if(now-state.lastClick<250)state.combo++;else state.combo=1;
  state.lastClick=now;
  if(state.energy<=0)return toast('💀 Егор в отключке! Покорми или отдохни.');
  if(state.brains<=0)return toast('🧠💥 Мозгов нет! Отдохни.');
  const cb=Math.min(state.combo,10)*0.1,ep=state.energy<20?0.5:1;
  const earn=Math.floor((fpc()+state.combo*0.02)*ep);
  state.fat+=earn;state.totalFat+=earn;
  state.brains=clamp(state.brains-1,0,state.maxBrains);
  state.energy=clamp(state.energy-1,0,state.maxEnergy);
  sndClick();spawnRipple(e);spawnParticle('+'+earn+' 🍔');
  checkEvents();update();save();
}

function spawnRipple(e){
  const box=$('rippleBox'),r=document.createElement('div');
  r.className='ripple-el';
  if(e&&e.clientX){
    const rect=box.getBoundingClientRect();
    r.style.left=(e.clientX-rect.left-10)+'px';r.style.top=(e.clientY-rect.top-10)+'px';
  }else{r.style.left='80px';r.style.top='80px'}
  r.style.width=r.style.height=(15+rnd(0,15))+'px';
  box.appendChild(r);setTimeout(()=>r.remove(),700);
}

function spawnParticle(t){
  const box=$('particleBox'),p=document.createElement('div');
  p.className='particle-el';p.textContent=t;
  p.style.left=rnd(20,70)+'%';p.style.top=rnd(20,50)+'%';
  p.style.fontSize=(16+rnd(0,12))+'px';
  box.appendChild(p);setTimeout(()=>p.remove(),1000);
}

function feed(){
  if(state.eventActive)return;
  state.hunger=clamp(state.hunger+25,0,100);
  state.energy=clamp(state.energy+15,0,state.maxEnergy);
  state.fat+=3;state.totalFat+=3;
  sndGood();toast('🍔 Егор покушал!');update();save();
}
function rest(){
  if(state.eventActive)return;
  state.energy=clamp(state.energy+30,0,state.maxEnergy);
  state.brains=clamp(state.brains+10,0,state.maxBrains);
  sndGood();toast('💤 Егор поспал!');update();save();
}

function checkEvents(){
  if(state.eventActive||state.evCooldown>0){if(state.evCooldown>0)state.evCooldown--;return}
  const chance=Math.min(0.1,0.06-(state.upgrades.fol||0)*0.03);
  if(state.upgrades.fol>0&&Math.random()<0.5)return;
  if(Math.random()<chance){const e=events[Math.floor(Math.random()*events.length)];triggerEvent(e)}
}

let evTaps=0,evTimer=null;
function triggerEvent(e){
  state.eventActive=true;
  const overlay=$('eventOverlay');
  $('evIcon').textContent=e.i;$('evTitle').textContent=e.t;$('evDesc').textContent=e.d;
  const btn=$('evBtn');btn.textContent=e.b;btn.className='event-btn';
  overlay.classList.add('show');
  if(e.tp==='wait'){
    btn.style.pointerEvents='none';btn.style.opacity='0.4';
    setTimeout(()=>{btn.style.pointerEvents='auto';btn.style.opacity='1';btn.onclick=()=>resolveEv(true,e)},e.n);
  }else if(e.tp==='bonus'){
    btn.style.opacity='1';btn.style.pointerEvents='auto';btn.onclick=()=>resolveEv(true,e);
  }else if(e.tp==='tap'){
    evTaps=0;btn.onclick=()=>{
      evTaps++;btn.textContent=`${e.b} (${evTaps}/${e.n})`;
      btn.style.transform='scale(0.93)';setTimeout(()=>btn.style.transform='scale(1)',80);
      tone(400+evTaps*50,0.05);
      if(evTaps>=e.n)resolveEv(true,e);
    };
    evTimer=setTimeout(()=>{if(state.eventActive)resolveEv(false,e)},e.ti);
  }
}
function resolveEv(ok,e){
  if(!state.eventActive)return;state.eventActive=false;$('eventOverlay').classList.remove('show');
  if(evTimer){clearTimeout(evTimer);evTimer=null}
  if(ok){
    toast('✅ '+e.s.t);state.fat+=2;state.totalFat+=2;
    if(e.tp==='bonus'){state.fat+=e.n;state.totalFat+=e.n;spawnParticle('+'+e.n+' 🍔')}
    sndGood();
  }else{
    toast('❌ '+e.f.t);state.fails++;const p=e.tp==='wait'?10:e.tp==='bonus'?3:5;
    state.fat=Math.max(0,state.fat-p);sndBad();
    $('app').style.animation='shake 0.4s ease';setTimeout(()=>$('app').style.animation='',400);
  }
  state.evCooldown=8+Math.floor(Math.random()*8);update();save();
}
$('eventOverlay').addEventListener('click',function(e){
  if(e.target===this&&state.eventActive){state.eventActive=false;this.classList.remove('show');state.fails++;sndBad();toast('❌ Струсил!');update();save()}
});

function renderShop(){
  $('shopGrid').innerHTML=shop.map(item=>{
    const c=cost(item.id),lvl=state.upgrades[item.id]||0,can=state.fat>=c;
    return `<div class="shop-card ${can&&lvl<99?'affordable':''}${!can?' locked':''}" data-id="${item.id}">
      ${lvl>0?`<div class="lvl">${lvl}</div>`:''}
      <div class="icon">${item.i}</div>
      <div class="name">${item.n}</div>
      <div class="cost">${c} 🍔</div>
      <div class="desc">${item.e}</div>
    </div>`
  }).join('');
  document.querySelectorAll('.shop-card').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.id,c=cost(id);
      if(state.fat<c||(state.upgrades[id]||0)>=99)return;
      state.fat-=c;state.upgrades[id]=(state.upgrades[id]||0)+1;
      sndBuy();toast('✅ '+shop.find(x=>x.id===id).n+' куплено!');update();renderShop();save();
    });
  });
}

function toast(msg){
  const box=$('toastBox'),t=document.createElement('div');t.className='toast';t.textContent=msg;
  box.appendChild(t);setTimeout(()=>{t.style.transition='all 0.3s';t.style.opacity='0';t.style.transform='translateY(-10px)';setTimeout(()=>t.remove(),300)},2000);
}

let updateLock=false;
function update(){
  const fp=fps(),fc=fpc(),bd=Math.max(1,1+Math.floor(state.day/3)),ed=Math.max(1,1+Math.floor(state.day/5));
  $('fatVal').textContent=Math.floor(state.fat);
  $('brainVal').textContent=Math.floor(state.brains);
  $('energyVal').textContent=Math.floor(state.energy);
  $('fps').textContent=fp;$('bpd').textContent=bd;$('epd').textContent=ed;
  $('fatBar').style.width=state.hunger+'%';
  $('brainBar').style.width=(state.brains/state.maxBrains*100)+'%';
  $('energyBar').style.width=(state.energy/state.maxEnergy*100)+'%';
  $('dayDisplay').textContent=state.day;$('failDisplay').textContent=state.fails;
  $('failsTotal').textContent=state.fails;$('totalFatVal').textContent=Math.floor(state.totalFat);$('dayTotal').textContent=state.day;
  const nd=1+Math.floor(state.totalFat/50);
  if(nd>state.day&&!updateLock){
    updateLock=true;state.day=nd;state.maxBrains=100+state.day*8;state.maxEnergy=100+state.day*8;
    const cel=$('celebration');cel.classList.add('show');
    setTimeout(()=>{cel.classList.remove('show');updateLock=false},1500);
    toast('🌙 День '+state.day+'! Егор тупеет!');
  }
}

function loop(){
  if(!state.eventActive){
    const f=fps(),bd=Math.max(1,1+Math.floor(state.day/3)),ed=Math.max(1,1+Math.floor(state.day/5));
    if(f>0&&state.brains>0&&state.energy>0){state.fat+=f*0.1;state.totalFat+=f*0.1}
    state.hunger=clamp(state.hunger-0.12,0,100);
    state.brains=clamp(state.brains-bd*0.04,0,state.maxBrains);
    state.energy=clamp(state.energy-ed*0.04,0,state.maxEnergy);
    checkEvents();update();renderShop();save();
  }
}

function resetGame(){if(confirm('Сбросить весь прогресс?')){localStorage.removeItem('egor2');location.reload()}}

load();
$('egorClick').addEventListener('click',clickEgor);
$('btnFeed').addEventListener('click',feed);
$('btnRest').addEventListener('click',rest);
$('resetBtn').addEventListener('click',resetGame);
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){e.preventDefault();if(state.eventActive)$('evBtn').click();else clickEgor(e)}
  if(e.key==='f')feed();if(e.key==='r')rest()
});
update();renderShop();setInterval(loop,100);
toast('🐷 Кликай по Егору! Пробел/F/R');

console.log('🐷 ЕГОР-КЛИКЕР v2.0 PREMIUM');
</script>
</body>
</html>
